<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Analytics — Event Sustainability Made Simple</title>
<meta name="description" content="Your clients are asking. Compliance is coming. Green Analytics makes event sustainability simple — register, submit your documents, and let our AI do the rest.">
<meta property="og:title" content="Green Analytics — Event Sustainability Made Simple">
<meta property="og:description" content="Your clients are asking about sustainability. We handle everything. Register, submit documents, receive your verified report.">
<meta property="og:url" content="https://GreenAnalytics.org">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0D1B2A; --navy2:#132236; --navy3:#1A3A4A;
  --teal:#00B4A6; --teal2:#00D4C4; --teal3:#007A72;
  --white:#FFFFFF; --muted:#8BA3B0; --border:rgba(0,180,166,0.15);
  --serif:'Instrument Serif',Georgia,serif; --sans:'Geist',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--navy);color:var(--white);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 15%,rgba(0,180,166,0.07) 0%,transparent 60%),radial-gradient(ellipse 50% 70% at 85% 85%,rgba(0,180,166,0.05) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(13,27,42,0.92);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-mark{width:30px;height:30px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;color:var(--navy);font-style:italic;}
.nav-name{font-family:var(--serif);font-size:17px;color:var(--white);}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none;}
.nav-links a{font-size:13px;font-weight:500;color:rgba(255,255,255,0.65);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover{color:var(--teal);}
.nav-cta{background:var(--teal)!important;color:var(--navy)!important;font-weight:600!important;padding:8px 20px;border-radius:6px;}
.nav-cta:hover{background:var(--teal2)!important;color:var(--navy)!important;}

/* BUTTONS */
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:var(--navy);font-weight:600;font-size:15px;padding:14px 28px;border-radius:8px;text-decoration:none;border:none;cursor:pointer;transition:all 0.2s;font-family:var(--sans);}
.btn-primary:hover{background:var(--teal2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,180,166,0.3);}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--white);font-weight:500;font-size:15px;padding:14px 24px;border-radius:8px;text-decoration:none;border:1px solid rgba(255,255,255,0.2);cursor:pointer;transition:all 0.2s;font-family:var(--sans);}
.btn-secondary:hover{border-color:var(--teal);color:var(--teal);transform:translateY(-2px);}

/* HERO */
.hero{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;padding:120px 48px 80px;max-width:1200px;margin:0 auto;}
.hero-content{max-width:700px;}
.hero-headline{font-family:var(--serif);font-size:clamp(44px,5.5vw,76px);line-height:1.08;letter-spacing:-1px;color:var(--white);margin-bottom:24px;opacity:0;animation:fadeUp 0.8s 0.35s ease forwards;}
.hero-headline em{font-style:italic;color:var(--teal);}
.hero-sub{font-size:19px;line-height:1.7;color:var(--muted);margin-bottom:16px;max-width:580px;opacity:0;animation:fadeUp 0.8s 0.5s ease forwards;}
.hero-sub strong{color:var(--white);}
.hero-actions{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-top:40px;opacity:0;animation:fadeUp 0.8s 0.65s ease forwards;}
.hero-proof{display:flex;align-items:center;gap:24px;margin-top:48px;padding-top:40px;border-top:1px solid var(--border);opacity:0;animation:fadeUp 0.8s 0.8s ease forwards;}
.hero-proof-stat{text-align:left;}
.hero-proof-num{font-family:var(--serif);font-size:32px;color:var(--teal);line-height:1;display:block;}
.hero-proof-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-top:3px;}
.hero-proof-divider{width:1px;height:40px;background:var(--border);}

/* SECTION BASE */
section{position:relative;z-index:1;}
.section-inner{max-width:1200px;margin:0 auto;padding:100px 48px;}
.section-eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--teal);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.section-eyebrow::before{content:'';display:block;width:20px;height:2px;background:var(--teal);}
.section-headline{font-family:var(--serif);font-size:clamp(34px,4vw,54px);line-height:1.1;letter-spacing:-0.5px;margin-bottom:20px;}
.section-headline em{font-style:italic;color:var(--teal);}
.section-body{font-size:17px;line-height:1.7;color:var(--muted);max-width:640px;}

/* PRESSURE SECTION */
.pressure-section{background:var(--navy2);}
.pressure-intro{max-width:700px;margin-bottom:60px;}
.pressure-intro p{font-size:19px;line-height:1.7;color:rgba(255,255,255,0.85);margin-bottom:16px;}
.pressure-intro p:last-child{margin-bottom:0;}
.pressure-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.pressure-card{padding:28px 24px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;position:relative;overflow:hidden;transition:border-color 0.25s;}
.pressure-card:hover{border-color:rgba(0,180,166,0.3);}
.pressure-card-icon{font-size:28px;margin-bottom:16px;display:block;}
.pressure-card-title{font-size:15px;font-weight:600;color:var(--white);margin-bottom:10px;line-height:1.3;}
.pressure-card-text{font-size:13px;color:var(--muted);line-height:1.6;}
.pressure-card-stat{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--teal);font-weight:600;}

/* STAT CALLOUT */
.stat-callout{background:var(--navy);padding:80px 48px;}
.stat-callout-inner{max-width:900px;margin:0 auto;text-align:center;}
.stat-big{font-family:var(--serif);font-size:clamp(60px,10vw,120px);color:var(--white);line-height:1;display:block;margin-bottom:20px;}
.stat-big em{color:var(--teal);font-style:italic;}
.stat-line{font-size:22px;line-height:1.6;color:rgba(255,255,255,0.85);max-width:640px;margin:0 auto 12px;}
.stat-sub{font-size:16px;color:var(--muted);font-style:italic;}

/* HOW IT WORKS */
.how-section{background:var(--navy2);}
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:64px;position:relative;}
.steps-grid::before{content:'';position:absolute;top:40px;left:16%;right:16%;height:1px;background:linear-gradient(90deg,transparent,var(--teal),var(--teal),transparent);opacity:0.25;}
.step{text-align:center;padding:0 24px;}
.step-num{width:80px;height:80px;border-radius:50%;background:var(--navy);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-family:var(--serif);font-size:32px;color:var(--teal);position:relative;z-index:1;transition:all 0.3s;}
.step:hover .step-num{background:var(--teal);color:var(--navy);border-color:var(--teal);}
.step-title{font-size:18px;font-weight:600;color:var(--white);margin-bottom:12px;}
.step-desc{font-size:14px;color:var(--muted);line-height:1.6;}
.step-tag{display:inline-block;margin-top:12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--teal);background:rgba(0,180,166,0.08);padding:4px 12px;border-radius:20px;border:1px solid rgba(0,180,166,0.2);}

/* WEBINAR */
.webinar-section{background:var(--navy);}
.webinar-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;margin-top:60px;}
.video-container{position:relative;border-radius:16px;overflow:hidden;background:var(--navy3);border:1px solid var(--border);}
.video-container iframe,.video-container video{width:100%;aspect-ratio:16/9;display:block;border:none;}
.yt-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.5);margin-top:10px;text-decoration:none;transition:color 0.2s;}
.yt-badge:hover{color:var(--teal);}
.webinar-segs{display:flex;flex-direction:column;gap:8px;margin-top:20px;}
.webinar-seg{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,0.7);}
.webinar-seg::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;}
.webinar-right p{font-size:16px;color:rgba(255,255,255,0.8);line-height:1.7;margin-bottom:20px;}
.webinar-right strong{color:var(--white);}

/* GIFTS */
.gifts-section{background:var(--navy2);}
.gifts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:60px;}
.gift-card{background:var(--navy3);border:1px solid var(--border);border-radius:14px;padding:32px 28px;position:relative;overflow:hidden;transition:transform 0.25s,border-color 0.25s;}
.gift-card:hover{transform:translateY(-4px);border-color:rgba(0,180,166,0.35);}
.gift-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--teal);}
.gift-num{font-family:var(--serif);font-size:52px;color:rgba(0,180,166,0.12);line-height:1;position:absolute;top:20px;right:24px;font-style:italic;}
.gift-icon{font-size:28px;margin-bottom:16px;display:block;}
.gift-title{font-size:17px;font-weight:600;color:var(--white);margin-bottom:8px;line-height:1.3;}
.gift-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px;}
.gift-delivery{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--teal);}

/* INTAKE / EMAIL CAPTURE */
.intake-section{background:var(--navy);}
.intake-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
.intake-points{display:flex;flex-direction:column;gap:20px;margin-bottom:36px;}
.intake-point{display:flex;gap:16px;}
.intake-point-icon{width:40px;height:40px;border-radius:10px;background:rgba(0,180,166,0.1);border:1px solid rgba(0,180,166,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.intake-point-title{font-size:15px;font-weight:600;color:var(--white);margin-bottom:3
